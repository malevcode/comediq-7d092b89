# fly.toml app configuration file generated for comediq-pb on 2026-05-01T16:31:49-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'comediq-pb'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'pb_data'
  destination = '/pb/pb_data'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
